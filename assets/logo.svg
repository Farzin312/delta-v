<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" fill="none">
  <defs>
    <linearGradient id="arc-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f85149"/>
      <stop offset="50%" stop-color="#f0883e"/>
      <stop offset="100%" stop-color="#58a6ff"/>
    </linearGradient>
  </defs>

  <!-- Trajectory arc: red-to-blue gradient representing a burn changing a trajectory -->
  <path d="M 60 170 Q 200 20 360 90 Q 520 160 740 50"
        stroke="url(#arc-grad)" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Burn point -->
  <circle cx="360" cy="90" r="5" fill="#f0883e"/>
  <circle cx="360" cy="90" r="9" fill="none" stroke="#f0883e" stroke-width="1" opacity="0.4"/>

  <!-- Minimal label -->
  <text x="400" y="200" font-family="SF Mono, Monaco, monospace" font-size="13"
        fill="#6e7681" letter-spacing="3" text-anchor="middle">
    PHYSICS / RUST / PYTHON / C/C++ / SPACE SYSTEMS
  </text>
</svg>
