<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" fill="none">
  <defs>
    <linearGradient id="orbit" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#bc8cff" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="flame" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f0883e"/>
      <stop offset="60%" stop-color="#f85149"/>
      <stop offset="100%" stop-color="#f85149" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Orbital ellipse -->
  <ellipse cx="180" cy="100" rx="120" ry="70" stroke="url(#orbit)" stroke-width="1.5" stroke-dasharray="4 3" fill="none" transform="rotate(-15 180 100)"/>

  <!-- Central body (planet) -->
  <circle cx="160" cy="100" r="14" fill="#1f6feb" filter="url(#glow)"/>
  <circle cx="156" cy="96" r="4" fill="#58a6ff" opacity="0.6"/>

  <!-- Spacecraft at burn point -->
  <circle cx="295" cy="72" r="4" fill="#f0883e" filter="url(#glow)"/>

  <!-- Delta-v vector (the burn) -->
  <line x1="295" y1="72" x2="340" y2="52" stroke="url(#flame)" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="340,52 333,50 335,58" fill="#f85149"/>

  <!-- Original velocity vector -->
  <line x1="295" y1="72" x2="320" y2="42" stroke="#58a6ff" stroke-width="1" stroke-dasharray="2 2" opacity="0.5"/>
  <polygon points="320,42 314,44 318,50" fill="#58a6ff" opacity="0.5"/>

  <!-- Text -->
  <text x="380" y="95" font-family="SF Mono, Monaco, Consolas, monospace" font-size="56" font-weight="bold" fill="#c9d1d9">
    delta-v
  </text>
  <text x="384" y="130" font-family="SF Mono, Monaco, Consolas, monospace" font-size="14" fill="#8b949e" letter-spacing="2">
    PHYSICS . RUST . SPACE SYSTEMS
  </text>

  <!-- Subtle underline -->
  <line x1="384" y1="145" x2="760" y2="145" stroke="#30363d" stroke-width="1"/>
  <text x="384" y="168" font-family="SF Mono, Monaco, Consolas, monospace" font-size="11" fill="#6e7681">
    The energy cost of changing trajectories
  </text>
</svg>
