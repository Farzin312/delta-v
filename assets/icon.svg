<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none">
  <defs>
    <linearGradient id="arc-grad-sq" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f85149"/>
      <stop offset="50%" stop-color="#f0883e"/>
      <stop offset="100%" stop-color="#58a6ff"/>
    </linearGradient>
  </defs>

  <!-- Dark background for social/og use -->
  <rect width="256" height="256" rx="32" fill="#0d1117"/>

  <!-- Trajectory arc with burn -->
  <path d="M 36 200 Q 90 40 180 110 Q 215 145 230 80"
        stroke="url(#arc-grad-sq)" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- Burn point -->
  <circle cx="180" cy="110" r="7" fill="#f0883e"/>
  <circle cx="180" cy="110" r="13" fill="none" stroke="#f0883e" stroke-width="1.5" opacity="0.3"/>
</svg>
